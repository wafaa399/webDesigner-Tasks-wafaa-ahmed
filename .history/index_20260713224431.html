<! html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Diversity and Inclusion Training Registration Form"
    />
    <meta name="author" content="Wafaa Ahmed" />
    <title>Diversity & Inclusion Training</title>
  </head>
  <body>
    <h1>Diversity & Inclusion Training</h1>

    <form action="" method="post">
      <label for="name">Name</label><br />
      <input type="text" id="name" name="name" required />
      <br /><br />

      <label for="password">Password</label><br />
      <input type="password" id="password" name="password" required />
      <br /><br />

      <label for="email">Email</label><br />
      <input type="email" id="email" name="email" required />
      <br /><br />

      <label for="tel">Tel</label><br />
      <input type="tel" id="tel" name="tel" />
      <br /><br />

      <label for="company">Organization or Company:</label><br />
      <textarea id="company" name="company" rows="2" cols="50"></textarea>
      <br /><br />

      <p><strong>Registration Type</strong></p>

      <input
        type="checkbox"
        id="business"
        name="registration"
        value="Business"
      />
      <label for="business">Business</label><br />

      <input
        type="checkbox"
        id="educator"
        name="registration"
        value="Educator"
      />
      <label for="educator">Educator</label><br />

      <input type="checkbox" id="parent" name="registration" value="Parent" />
      <label for="parent">Parent</label><br />

      <input type="checkbox" id="student" name="registration" value="Student" />
      <label for="student">Student</label><br />

      <input type="checkbox" id="other" name="registration" value="Other" />
      <label for="other">Other</label>

      <br /><br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
